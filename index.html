<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum FIFA World Cup 2026</title>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="contenedor__caja_herramientas">
        <div class="caja__herramientas__herramienta">
            <button type="button" class="btn_herramienta__emergente">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>

            <div class="herramienta__titulo__accion">
                <div class="contenedor__input__busqueda">
                    <label class="formulario_etiqueta" for="paisBusqueda">País a buscar:</label>
                    <input type="text" class="input input__busqueda" aria-label="Escribe cuál país deseas buscar" placeholder="Escribe el país a buscar" id="paisBusqueda">
                </div>
                <button type="button" class="btn_limpiar__busqueda" title="Limpiar búsqueda" id="btnLimpiarBusqueda">
                    <i class="fa-solid fa-circle-xmark"></i>
                </button>
            </div>
        </div>

        <div class="caja__herramientas__herramienta">
            <button type="button" class="btn_herramienta__emergente">
                <i class="fa-solid fa-download"></i>
            </button>

            <div class="herramienta__titulo__accion">
                <button type="button" class="btn_descargar__faltantes" id="btn__descargar__faltantes">
                    Descargar faltantes
                </button>
            </div>
        </div>

        <div class="caja__herramientas__herramienta herramienta__emergente" title="Mostrar herramientas">
            <button type="button" class="btn_herramienta__emergente" id="btn_herramienta__emergente__configuracion">
                <i class="fa-solid fa-screwdriver-wrench"></i>
            </button>
        </div>
    </div>

    <header class="header" id="headerPage">
        <div class="contenedor__menu">
            <div class="contenedor__logo">
                <p class="logo__nombre">Álbum Mundial 2026</p>
            </div>
            <div class="contenedor__toggleMenu">
                <button type="button" class="toggleMenu" id="toggleMenu" title="Desplegar Grupos">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>

        <aside class="contenedor__menu__secundario" id="menuGrupos">
            <nav class="menu__secundario">
                <ul class="lista__menu">
                    <li class="menu__item">
                        <a href="#FIFA" class="menu__enlace">Grupo FIFA
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#A" class="menu__enlace">Grupo A
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#B" class="menu__enlace">Grupo B
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#C" class="menu__enlace">Grupo C
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#D" class="menu__enlace">Grupo D
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#E" class="menu__enlace">Grupo E
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#F" class="menu__enlace">Grupo F
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#G" class="menu__enlace">Grupo G
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#H" class="menu__enlace">Grupo H
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#I" class="menu__enlace">Grupo I
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#J" class="menu__enlace">Grupo J
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#K" class="menu__enlace">Grupo K
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                    <li class="menu__item">
                        <a href="#L" class="menu__enlace">Grupo L
                            <span class="icono__bola">
                                <i class="fa-solid fa-futbol"></i>
                            </span>                            
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>
    </header>

    <main class="contenedor__principal">        
        <div class="contenedor__album" id="album"></div>
    </main>

    <script type="module" src="script/script.js"></script>
    <script src="https://kit.fontawesome.com/1de8be47a9.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
