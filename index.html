<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álbum FIFA World Cup 2026</title>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="contenedor__principal">
        <aside class="contenedor__menu__secundario">
            <nav class="menu__secundario">
                <ul class="lista__menu">
                    <li class="menu__item">
                        <a href="#FIFA" class="menu__enlace">Grupo FIFA</a>
                    </li>
                    <li class="menu__item">
                        <a href="#A" class="menu__enlace">
                            <span>Grupo A</span>
                            <button type="button" class="btn__icon" id="btnAcordeonGrupo">
                                <i class="fa-solid fa-turn-down"></i>
                            </button>
                        </a>
                        <div class="menu__contenedor__banderas">
                            <div class="contenedor__bandera">
                                <img class="item__img" src="img/MEX.webp">
                                <span>México</span>
                            </div>
                            <div class="contenedor__bandera">
                                <img class="item__img" src="img/RSA.webp">
                                <span>Sudáfrica</span>
                            </div>
                            <div class="contenedor__bandera">
                                <img class="item__img" src="img/KOR.webp">
                                <span>Korea del Sur</span>
                            </div>
                            <div class="contenedor__bandera">
                                <img class="item__img" src="img/CZE.webp">
                                <span>República Checa</span>
                            </div>
                        </div>
                    </li>
                    <li class="menu__item">
                        <a href="#B" class="menu__enlace">Grupo B</a>
                    </li>
                    <li class="menu__item">
                        <a href="#C" class="menu__enlace">Grupo C</a>
                    </li>
                    <li class="menu__item">
                        <a href="#D" class="menu__enlace">Grupo D</a>
                    </li>
                    <li class="menu__item">
                        <a href="#E" class="menu__enlace">Grupo E</a>
                    </li>
                    <li class="menu__item">
                        <a href="#F" class="menu__enlace">Grupo F</a>
                    </li>
                    <li class="menu__item">
                        <a href="#G" class="menu__enlace">Grupo G</a>
                    </li>
                    <li class="menu__item">
                        <a href="#H" class="menu__enlace">Grupo H</a>
                    </li>
                    <li class="menu__item">
                        <a href="#I" class="menu__enlace">Grupo I</a>
                    </li>
                    <li class="menu__item">
                        <a href="#J" class="menu__enlace">Grupo J</a>
                    </li>
                    <li class="menu__item">
                        <a href="#K" class="menu__enlace">Grupo K</a>
                    </li>
                    <li class="menu__item">
                        <a href="#L" class="menu__enlace">Grupo L</a>
                    </li>
                </ul>
            </nav>
        </aside>
        <div class="contenedor__album" id="album"></div>
    </main>

    <script type="module" src="script/script.js"></script>
    <script src="https://kit.fontawesome.com/1de8be47a9.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
